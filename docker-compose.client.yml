# ─────────────────────────────────────────────────────────────────────────────
#  BrainBoard – TEAM MEMBERS (everyone except the DB host)
#
#  Runs: Django BE + FastAPI AI + React FE
#  Connects to Prashant's shared PostgreSQL over the network.
#
#  Run: docker-compose -f docker-compose.client.yml up --build
#
#  Services:
#    Frontend  → http://localhost:5173
#    Django BE → http://localhost:8000
#    AI API    → http://localhost:8001
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Django Backend ──────────────────────────────────────────────────────────
  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: brainboard_be
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./BE:/app

  # ── FastAPI AI Service ──────────────────────────────────────────────────────
  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile.dev
    container_name: brainboard_ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./AI:/app
      - ./AI/chroma_db:/app/chroma_db

  # ── React / Vite Frontend ───────────────────────────────────────────────────
  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: brainboard_fe
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./FE:/app
      - fe_modules:/app/node_modules
    depends_on:
      - be

volumes:
  fe_modules:
