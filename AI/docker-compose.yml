version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jiragenie_api
    ports:
      - "8000:8000"
    volumes:
      # Mounts the local directory into the container to enable live reloading
      - .:/app
      # Bind mount: chroma_db files now visible directly in your local project folder
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
